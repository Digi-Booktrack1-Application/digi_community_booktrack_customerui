apiVersion: apps/v1
kind: Deployment

metadata:
  name: customer-frontend
  namespace: tracking-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: customer-frontend

  template:
    metadata:
      labels:
        app: customer-frontend

    spec:
      containers:
        - name: customer
          image: nginx:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 5174
